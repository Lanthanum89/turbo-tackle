<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Turbo Dash</title>
<meta name="theme-color" content="#050813" />
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icons/icon-192.png" type="image/png" />
<link rel="apple-touch-icon" href="icons/icon-180.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="game-container">
  <canvas id="game-canvas"></canvas>

  <div id="mode-screen" class="overlay">
    <button id="mute-btn" class="icon-btn corner-btn" aria-label="Toggle sound">🔊</button>
    <img src="icons/icon.svg" class="title-badge" alt="Turbo Dash" />
    <h1>TURBO<br />DASH</h1>
    <p class="subtitle">Pick a mode!</p>

    <div class="mode-select">
      <button class="mode-card mode-dodge" data-mode="dodge">
        <span class="mode-name">DODGE</span>
        <span class="mode-desc">Just avoid the rocks</span>
      </button>
      <button class="mode-card mode-collect" data-mode="collect">
        <span class="mode-name">COLLECT &amp; AVOID</span>
        <span class="mode-desc">Grab stars, dodge rocks</span>
      </button>
      <button class="mode-card mode-rainbow" data-mode="rainbow">
        <span class="mode-name">RAINBOW ROCKET</span>
        <span class="mode-desc">Follow the rainbow lane</span>
      </button>
    </div>

    <p class="menu-footer">
      Made with <img src="icons/heart.svg" class="pixel-heart" alt="love" /> for Freddie.
    </p>
  </div>

  <div id="start-screen" class="overlay hidden">
    <button id="back-to-modes-btn" class="icon-btn back-btn" aria-label="Back to modes">←</button>
    <h1 id="difficulty-mode-title">DODGE</h1>
    <p class="subtitle" id="difficulty-mode-desc">Just avoid the rocks</p>

    <div id="difficulty-select" class="difficulty-select"></div>

    <p id="high-score-display" class="high-score"></p>
    <p id="control-hint" class="control-hint">← → or swipe to dodge</p>
  </div>

  <div id="game-over-screen" class="overlay hidden">
    <h1 id="game-over-title" class="game-over-title">GAME OVER</h1>
    <p id="game-over-message" class="message-line"></p>
    <p id="final-score" class="final-score"></p>
    <div class="stats-row">
      <span id="stat-best">Best: 0</span>
      <span id="stat-time">Time: 0.0s</span>
      <span id="stat-stars" class="hidden">Stars: 0</span>
      <span id="stat-dodged" class="hidden">Dodged: 0</span>
      <span id="stat-accuracy" class="hidden">On Target: 0%</span>
    </div>
    <button id="restart-btn" class="primary-btn">Play Again</button>
    <button id="change-difficulty-btn" class="outline-btn">Main Menu</button>
  </div>

  <div id="pause-overlay" class="overlay hidden">
    <h1 class="pause-title">PAUSED</h1>
    <button id="resume-btn" class="primary-btn">▶ Resume</button>
    <button id="pause-mute-btn" class="secondary-btn">🔊 Sound</button>
    <button id="quit-btn" class="outline-btn">Quit to menu</button>
  </div>

  <div id="countdown-overlay" class="overlay hidden">
    <div id="countdown-text">3</div>
  </div>

  <div id="hud" class="hidden">
    <button id="pause-btn" class="icon-btn pixel-btn" aria-label="Pause">
      <img src="icons/pause-icon.svg" class="pixel-icon" alt="" aria-hidden="true" />
    </button>
    <span id="score-hud">0</span>
    <span id="lives-hud"></span>
  </div>

  <div id="touch-controls" class="hidden">
    <button id="btn-left" aria-label="Move left">◀</button>
    <button id="btn-right" aria-label="Move right">▶</button>
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
